
<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小状元识字</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
</head>

<body>

<div id="coverPage" class="cover-page">

<div class="logo-box">
<div class="logo">🎓</div>

<h1>小状元识字</h1>

<p>像状元一样快乐读书</p>
</div>

<div class="cover-card">

<label>学校名称</label>
<input type="text" value="SJKC DENGKIL" readonly>

<label>输入你的名字</label>
<input type="text" id="studentName" placeholder="大名鼎鼎的小状元...">

<button onclick="startLearning()">🚀 开始识字</button>

</div>

<div class="history-box">

<h3>📊 学生记录</h3>

<div id="historyList"></div>

</div>

</div>

<div id="learningPage" class="hidden">

<div class="container">

<h1>🌈 小天使识字屋 Pro</h1>

<div class="score-box">
⭐ 分数：<span id="score">0</span>
</div>

<div class="student-info">
👦 <span id="displayName"></span>
</div>

<div class="card">

<div class="emoji" id="emoji">🍞</div>

<h2 id="word">面包</h2>

<p id="pinyin">miàn bāo</p>

<button onclick="speakWord()">🔊 示范读音</button>

<div class="stroke-section">

<h3>✍️ 笔顺学习</h3>

<div id="writer"></div>

<button onclick="animateStroke()">▶️ 播放笔顺</button>

</div>

<div class="quiz">

<h3>🎧 听音选答案</h3>

<button onclick="playQuestion()">🔊 播放题目</button>

<div class="choices">

<button onclick="checkAnswer('面包')">🍞 面包</button>
<button onclick="checkAnswer('饭')">🍚 饭</button>
<button onclick="checkAnswer('面')">🍜 面</button>
<button onclick="checkAnswer('包')">👜 包</button>

</div>

<p id="result"></p>

</div>

<button class="next-btn" onclick="nextWord()">➡️ 下一题</button>

</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
