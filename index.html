<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小天使识字屋</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>🌈 小天使识字屋</h1>
    <p class="subtitle">快乐识字 · 边玩边学</p>

    <div class="score-board">
      ⭐ 分数：<span id="score">0</span>
    </div>

    <div class="card">
      <button class="sound-btn" onclick="speakWord()">🔊 发音</button>
      <h2 id="word">苹果</h2>

      <div class="choices">
        <button onclick="checkAnswer('苹果')">🍎 苹果</button>
        <button onclick="checkAnswer('香蕉')">🍌 香蕉</button>
        <button onclick="checkAnswer('汽车')">🚗 汽车</button>
        <button onclick="checkAnswer('小猫')">🐱 小猫</button>
      </div>

      <p id="result"></p>
    </div>

    <div class="leaderboard">
      <h3>🏆 排行榜</h3>
      <ol>
        <li>小明 ⭐ 100</li>
        <li>小美 ⭐ 90</li>
        <li>小华 ⭐ 80</li>
      </ol>
    </div>

    <audio autoplay loop>
      <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8e56f9d5d.mp3?filename=children-music-112191.mp3" type="audio/mpeg">
    </audio>
  </div>

  <script src="script.js"></script>
</body>
</html>
